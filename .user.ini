; PHP session settings for sandbaggerscoring.com
; .user.ini is picked up by HostGator cPanel (PHP-FPM / CGI mode).

; Store sessions in a private directory owned only by this cPanel account.
; The default path (/var/cpanel/php/sessions/ea-php82) is shared across ALL
; customers on this server using PHP 8.2. Any other site with a short
; gc_maxlifetime can sweep that directory and delete our session files.
; This private path is invisible to other accounts — their GC cannot touch it.
session.save_path = /home1/ltmbxxte/php_sessions

; 30-day rolling session lifetime
session.gc_maxlifetime = 2592000
session.cookie_lifetime = 2592000

; Secure cookie flags
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
