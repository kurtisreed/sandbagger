; PHP session settings for sandbaggerscoring.com
; .user.ini is respected by NewFold/Bluehost shared hosting (CGI/FPM mode)
; This sets session lifetime at the PHP level — affects the GC that runs
; on this domain's requests, preventing other sites on the shared host
; from garbage-collecting our session files.

session.gc_maxlifetime = 2592000
session.cookie_lifetime = 2592000
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
